name: Sync fork

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to MarcosSulevis fork
        env:
          MARCOS_TOKEN: ${{ secrets.MARCOS_SYNC_TOKEN }}
        run: |
          git config --global user.email "sync-bot@sweetjoycakes.com"
          git config --global user.name "Sweet Joy Sync"
          git remote add fork https://MarcosSulevis:${MARCOS_TOKEN}@github.com/MarcosSulevis/sweet-joy.git
          git push fork main --force
