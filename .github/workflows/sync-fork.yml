name: Sync fork

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to MarcosSulevis repo
        env:
          MARCOS_TOKEN: ${{ secrets.MARCOS_SYNC_TOKEN }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git push https://MarcosSulevis:${MARCOS_TOKEN}@github.com/MarcosSulevis/sweet-joy.git HEAD:main --force

      - name: Trigger Cloudflare deploy
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
